repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true

      - id: deal-lint
        name: deal lint (FP purity)
        entry: uv run python -X utf8 -m deal lint
        language: system
        files: ^src/simpleharness/(core|approver_core)\.py$
        pass_filenames: true

      - id: fp-purity-gate
        name: FP purity gate (every def in core must have @deal.pure)
        entry: uv run python -X utf8 scripts/check_fp_purity.py src/simpleharness/core.py src/simpleharness/approver_core.py
        language: system
        pass_filenames: false
        files: ^(src/simpleharness/(core|approver_core)\.py|scripts/check_fp_purity\.py)$

      - id: deal-runtime
        name: deal runtime contracts
        entry: uv run python -X utf8 scripts/check_deal_runtime.py
        language: system
        files: ^src/simpleharness/(core|approver_core)\.py$
        pass_filenames: false

      - id: import-linter
        name: import-linter (architecture boundaries)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        types: [python]

      - id: detect-secrets
        name: detect secrets
        entry: uv run --group security detect-secrets-hook --baseline .secrets.baseline
        language: system
        types: [text]
