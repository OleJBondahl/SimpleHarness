repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uvx ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format (check)
        entry: uvx ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty-check
        name: ty check
        entry: uvx ty check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
