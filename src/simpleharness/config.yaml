# SimpleHarness toolbox defaults.
# Override per-worksite by placing a config.yaml in <worksite>/simpleharness/
# (only the fields you want to override — the rest fall through to these).

# ---- Model ----
# Model used for every role session. Roles use subagents to offload work
# to Sonnet/Haiku for context efficiency — see each role's body.
model: opus

# ---- Heartbeat ----
# Idle sleep between ticks when no task is active.
idle_sleep_seconds: 30

# ---- Per-task safety caps ----
# Hard cap on how many sessions a single task can consume before being blocked.
max_sessions_per_task: 20

# A single role can run at most this many times in a row before the harness
# blocks the task (catches runaway role repetition).
max_same_role_repeats: 3

# If STATE.md content hash is unchanged across this many consecutive ticks
# while status=active, the harness pauses and warns the user.
no_progress_tick_threshold: 5

# Fallback for --max-turns if a role does not override it in its frontmatter.
max_turns_default: 60

# ---- Streaming output ----
# Pass --include-partial-messages to claude so tokens stream live.
include_partial_messages: true

# ---- Permissions ----
permissions:
  # Permission mode. One of:
  #   safe       — --permission-mode acceptEdits + curated Bash allowlist.
  #                Anything outside DEFAULT_BASH_ALLOW + extra_bash_allow is
  #                denied. This is the default and fine on any host.
  #   approver   — same floor as safe mode, but blocked tool calls are
  #                forwarded to a per-worksite approver agent (see
  #                simpleharness_approver_mcp.py). Allowed patterns are
  #                appended to this file's extra_bash_allow so the workload
  #                shrinks over time. Approver mode wiring lands in Task 4.
  #   dangerous  — --permission-mode bypassPermissions. Approves EVERYTHING
  #                including arbitrary Bash. Only enable in a sandbox/
  #                container/VM — `simpleharness doctor` will refuse to
  #                start `watch` unless it detects a sandbox marker or you
  #                pass --i-know-its-dangerous.
  mode: approver

  # Model used by the approver agent when mode=approver.
  # One of: haiku | sonnet | opus. Ignored in safe/dangerous modes.
  approver_model: sonnet

  # If true, the approver's deny verdicts are also appended as notes to the
  # task's CORRECTION.md so the next session surfaces them to the user.
  # Off by default.
  escalate_denials_to_correction: false

  # Extra Bash patterns merged with harness.py DEFAULT_BASH_ALLOW.
  # Each entry is a glob pattern inside the Bash() wrapper, e.g. "make *".
  extra_bash_allow: []

  # Extra tool names merged with harness.py DEFAULT_TOOLS_ALLOW.
  # e.g. ["WebFetch", "WebSearch"]
  extra_tools_allow: []

# ---- Ollama (local model) ----
# When a role sets `provider: ollama` in its frontmatter, the harness spawns
# claude with ANTHROPIC_BASE_URL pointed at a local Ollama server. This lets
# simple/mechanical tasks run on a free local model instead of using
# subscription quota.
ollama:
  base_url: "http://localhost:11434"
  default_model: "qwen3.5-nothink"

# ---- Skills enforcement ----
# Every loaded role gets these as defaults, merged into its own skills
# frontmatter via merge_skill_lists. Roles can opt out of a specific
# default with `skills.exclude_default_must_use` in their frontmatter.
skills:
  # Informational — skills always listed as "available" in the session
  # reminder. Entries can be bare strings or {name, hint} mappings.
  default_available:
    - name: haiku-delegate
      hint: "delegate mechanical work (file reading, search, command execution) to Haiku"
    - name: python-coding-and-tooling
      hint: "Python toolchain conventions for this repo (uv, ruff, ty, pytest, deal)"

  # Skills every role must invoke before finishing (unless it opts out
  # per-role). Enforced by the Stop/SubagentStop hook.
  default_must_use:
    - updating-memory

  # enforcement: strict | warn | off
  #   strict — Stop hook exits 2 and blocks session termination on missing skills
  #   warn   — Stop hook prints a warning to stderr but allows termination
  #   off    — Stop hook is not registered
  enforcement: strict
