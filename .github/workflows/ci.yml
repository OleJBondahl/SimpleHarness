name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Architecture boundaries
        run: uv run lint-imports

      - name: Dead code
        run: uv run vulture

      - name: Tests
        run: uv run pytest

      - name: Core coverage (90% minimum)
        run: uv run pytest --override-ini="addopts=-ra --strict-markers" --cov --cov-config=core-coverage.ini -q --no-header

      - name: Prose linting
        uses: errata-ai/vale-action@reviewdog
        with:
          files: docs/ README.md
          vale_flags: "--minAlertLevel=error"

  mutate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Mutation testing (core modules)
        run: uv run python -m mutmut run --paths-to-mutate src/simpleharness/core.py --tests-dir tests/ --no-progress

      - name: Mutation results
        if: always()
        run: uv run python -m mutmut results
